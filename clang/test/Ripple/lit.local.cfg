# -*- Python -*-

import os
import subprocess

# config.clang is set by llvm_config.use_clang() in clang/test/lit.cfg.py
if config.clang:
    try:
        # Get the resource directory
        resource_dir = subprocess.check_output([config.clang, '-print-resource-dir'], universal_newlines=True).strip()

        # Check if ripple lib exists
        ripple_include_dir = os.path.join(resource_dir, 'lib', 'hexagon', 'include', 'ripple')
        if os.path.isdir(ripple_include_dir):
            config.available_features.add('has-ripple-hexagon-rtlib')
    except OSError:
        pass
