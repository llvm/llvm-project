# Test 4: Multilib reuse via selectRISCVMultilib fallback
# rv32ic has no exact match, but reuses rv32i/ilp32 (c is not in rv32i, but
# rv32i is a valid subset - atomic mismatch is not an issue here)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv32-unknown-elf -march=rv32ic -mabi=ilp32 --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-REUSE-RV32IC %s
# CHECK-REUSE-RV32IC: rv32i/ilp32

# rv32imc reuses rv32im/ilp32 (c is not in rv32im, but m+i subset matches)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv32-unknown-elf -march=rv32imc -mabi=ilp32 --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-REUSE-RV32IMC %s
# CHECK-REUSE-RV32IMC: rv32im/ilp32

# rv32imafdc reuses rv32imafc/ilp32f (d is not in rv32imafc, but i+m+a+f+c matches)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv32-unknown-elf -march=rv32imafdc -mabi=ilp32f --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-REUSE-RV32IMAFDC %s
# CHECK-REUSE-RV32IMAFDC: rv32imafc/ilp32f

# rv64gc (rv64imafdc) reuses rv64imafdc/lp64d (exact after canonicalization)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv64-unknown-elf -march=rv64gc -mabi=lp64d --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-REUSE-RV64GC %s
# CHECK-REUSE-RV64GC: rv64imafdc/lp64d

# riscv64 target with rv32i march still matches rv32i/ilp32
# (march determines the effective XLEN for multilib flag matching)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv64-unknown-elf -march=rv32i -mabi=ilp32 --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-RV64-WITH-RV32I %s
# CHECK-RV64-WITH-RV32I: rv32i/ilp32

# Test 5: No match - rv64imafdc with lp64f ABI has no matching multilib
# (lp64d is available but lp64f is not)
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-directory 2>&1 \
# RUN:     --target=riscv64-unknown-elf -march=rv64imafdc -mabi=lp64f --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-WRONG-ABI %s
# CHECK-WRONG-ABI: warning: no multilib found matching flags:

# Test 6: print-multi-lib lists all variants
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -print-multi-lib 2>&1 \
# RUN:     --target=riscv32-unknown-elf --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-PRINT-MULTI-LIB %s
# CHECK-PRINT-MULTI-LIB: rv32i/ilp32;@-target=riscv32-unknown-unknown-elf@mabi=ilp32@march=rv32i2p1
# CHECK-PRINT-MULTI-LIB: rv32im/ilp32;@-target=riscv32-unknown-unknown-elf@mabi=ilp32@march=rv32i2p1_m2p0_zmmul1p0
# CHECK-PRINT-MULTI-LIB: rv32iac/ilp32;@-target=riscv32-unknown-unknown-elf@mabi=ilp32@march=rv32i2p1_a2p1_c2p0_zaamo1p0_zalrsc1p0_zca1p0
# CHECK-PRINT-MULTI-LIB: rv32imac/ilp32;@-target=riscv32-unknown-unknown-elf@mabi=ilp32@march=rv32i2p1_m2p0_a2p1_c2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0
# CHECK-PRINT-MULTI-LIB: rv32imafc/ilp32f;@-target=riscv32-unknown-unknown-elf@mabi=ilp32f@march=rv32i2p1_m2p0_a2p1_f2p2_c2p0_zicsr2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0_zcf1p0

---
MultilibVersion: 1.0

Groups:
- Name: riscv-multilib
  Type: Exclusive

Variants:
- Dir: rv32i/ilp32
  Flags: [--target=riscv32-unknown-unknown-elf, -mabi=ilp32, -march=rv32i2p1]
  Group: riscv-multilib

- Dir: rv32im/ilp32
  Flags: [--target=riscv32-unknown-unknown-elf, -mabi=ilp32, -march=rv32i2p1_m2p0_zmmul1p0]
  Group: riscv-multilib

- Dir: rv32iac/ilp32
  Flags: [--target=riscv32-unknown-unknown-elf, -mabi=ilp32, -march=rv32i2p1_a2p1_c2p0_zaamo1p0_zalrsc1p0_zca1p0]
  Group: riscv-multilib

- Dir: rv32imac/ilp32
  Flags: [--target=riscv32-unknown-unknown-elf, -mabi=ilp32, -march=rv32i2p1_m2p0_a2p1_c2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0]
  Group: riscv-multilib

- Dir: rv64imac/lp64
  Flags: [--target=riscv64-unknown-unknown-elf, -mabi=lp64, -march=rv64i2p1_m2p0_a2p1_c2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0]
  Group: riscv-multilib

- Dir: rv32imafc/ilp32f
  Flags: [--target=riscv32-unknown-unknown-elf, -mabi=ilp32f, -march=rv32i2p1_m2p0_a2p1_f2p2_c2p0_zicsr2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0_zcf1p0]
  Group: riscv-multilib

- Dir: rv64imafdc/lp64d
  Flags: [--target=riscv64-unknown-unknown-elf, -mabi=lp64d, -march=rv64i2p1_m2p0_a2p1_f2p2_d2p2_c2p0_zicsr2p0_zmmul1p0_zaamo1p0_zalrsc1p0_zca1p0_zcd1p0]
  Group: riscv-multilib

