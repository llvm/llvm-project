# UNSUPPORTED: system-windows

# Test YAML multilib configuration for RISC-V baremetal targets.
# This YAML was generated from GCC --print-multi-lib output using
# gen-riscv-multilib-yaml-from-gcc.py. The canonicalized march strings
# are produced by clang and used directly without regex Mappings.

# Test 1: Exact match - rv32imac selects rv32imac/ilp32
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -x c %s -### -o %t.out 2>&1 \
# RUN:     --target=riscv32-unknown-elf -march=rv32imac -mabi=ilp32 --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-RV32IMAC %s
# CHECK-RV32IMAC:      "-cc1" "-triple" "riscv32-unknown-unknown-elf"
# CHECK-RV32IMAC-SAME: "-internal-isystem" "[[SYSROOT:[^"]*]]/bin/../lib/clang-runtimes/rv32imac/ilp32/include"
# CHECK-RV32IMAC:      "-L[[SYSROOT]]/bin/../lib/clang-runtimes/rv32imac/ilp32/lib"

# Test 2: Exact match - rv64imafdc selects rv64imafdc/lp64d
# RUN: %clang --multi-lib-config=%s -no-canonical-prefixes -x c %s -### -o %t.out 2>&1 \
# RUN:     --target=riscv64-unknown-elf -march=rv64imafdc -mabi=lp64d --sysroot= \
# RUN:   | FileCheck --check-prefix=CHECK-RV64IMAFDC %s
# CHECK-RV64IMAFDC:      "-cc1" "-triple" "riscv64-unknown-unknown-elf"
# CHECK-RV64IMAFDC-SAME: "-internal-isystem" "[[SYSROOT:[^"]*]]/bin/../lib/clang-runtimes/rv64imafdc/lp64d/include"
# CHECK-RV64IMAFDC:      "-L[[SYSROOT]]/bin/../lib/clang-runtimes/rv64imafdc/lp64d/lib"

