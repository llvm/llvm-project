# Test that yaml2obj can create ELF core files with program header Content
# and that obj2yaml can round-trip them back to YAML.

# RUN: yaml2obj %s -o %t
# RUN: llvm-readobj --file-header --program-headers %t | FileCheck -check-prefix=OBJ %s
# RUN: obj2yaml %t | FileCheck -check-prefix=YAML %s
# RUN: obj2yaml %t | yaml2obj - -o %t2
# RUN: cmp %t %t2

--- !ELF
FileHeader:
  Class:           ELFCLASS64
  Data:            ELFDATA2LSB
  Type:            ET_CORE
  Machine:         EM_X86_64
  EShEntSize:      0x0
  EShNum:          0x0
ProgramHeaders:
  - Type:            PT_NOTE
    Align:           0x4
    MemSize:         0x0
    Offset:          0x120
    Content:         040000000800000001000000434F524500000000DEADBEEF11223344
  - Type:            PT_LOAD
    Flags:           [ PF_R ]
    VAddr:           0x1000
    PAddr:           0x0
    Align:           0x4
    Offset:          0x13C
    Content:         '0102030405060708090A0B0C0D0E0F10'
  - Type:            PT_LOAD
    Flags:           [ PF_R, PF_W ]
    VAddr:           0x2000
    PAddr:           0x0
    Align:           0x4
    FileSize:        0x0
    MemSize:         0x1000
    Offset:          0x0
  - Type:            PT_LOAD
    Flags:           [ PF_R, PF_X ]
    VAddr:           0x3000
    PAddr:           0x0
    Align:           0x4
    Offset:          0x14C
    Content:         AABBCCDD
Sections:
  - Type:            SectionHeaderTable
    NoHeaders:       true

