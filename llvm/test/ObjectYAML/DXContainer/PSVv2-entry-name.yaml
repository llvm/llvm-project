# Verify that setting EntryName for PSV v2 does not place it in the string
# table. The entry name is only used starting at PSV v3.

# Produce the binary and round-trip it to YAML.
# RUN: yaml2obj %s -o %t
# RUN: obj2yaml %t | FileCheck %s --check-prefix=ROUNDTRIP

# Verify the entry name string does not appear anywhere in the binary.
# RUN: %python -c "data = open(r'%t', 'rb').read(); assert b'CSMain' not in data, 'Entry name should not be in binary for PSV v2'"

--- !dxcontainer
Header:
  Hash:            [ 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0,
                     0x0, 0x0, 0x0, 0x0, 0x0, 0x0 ]
  Version:
    Major:           1
    Minor:           0
  PartCount:       2
Parts:
  - Name:            PSV0
    Size:            144
    PSVInfo:
      Version:         2
      ShaderStage:     5
      MinimumWaveLaneCount: 0
      MaximumWaveLaneCount: 4294967295
      UsesViewID:      0
      SigInputVectors: 0
      SigOutputVectors: [ 8, 16, 32, 64 ]
      NumThreadsX:     512
      NumThreadsY:     1024
      NumThreadsZ:     2048
      EntryName:       CSMain
      ResourceStride:       24
      Resources:
        - Type:            Sampler
          Space:           2
          LowerBound:      3
          UpperBound:      4
          Kind:            TextureCube
          Flags:
            UsedByAtomic64:  false
        - Type:            Invalid
          Space:           32768
          LowerBound:      8388608
          UpperBound:      2147483648
          Kind:            Invalid
          Flags:
            UsedByAtomic64:  false
      SigInputElements: []
      SigOutputElements: []
      SigPatchOrPrimElements: []
      InputOutputMap:
        - [  ]
        - [  ]
        - [  ]
        - [  ]
  - Name:            DXIL
    Size:            24
    Program:
      MajorVersion:    6
      MinorVersion:    0
      ShaderKind:      5
      Size:            6
      DXILMajorVersion: 0
      DXILMinorVersion: 1
      DXILSize:        0
...

# The round-tripped YAML should not contain EntryName for PSV v2.
# ROUNDTRIP:     Version:         2
# ROUNDTRIP:     NumThreadsZ:     2048
# ROUNDTRIP-NOT: EntryName
# ROUNDTRIP:     ResourceStride:  24
