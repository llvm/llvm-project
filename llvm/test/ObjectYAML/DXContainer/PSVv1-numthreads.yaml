# Verify that specifying NumThreads fields for PSV v1 does not write them to
# the binary. NumThreads fields are only used starting at PSV v2.

# Produce the binary and round-trip it to YAML.
# RUN: yaml2obj %s -o %t
# RUN: obj2yaml %t | FileCheck %s --check-prefix=ROUNDTRIP

--- !dxcontainer
Header:
  Hash:            [ 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0,
                     0x0, 0x0, 0x0, 0x0, 0x0, 0x0 ]
  Version:
    Major:           1
    Minor:           0
  PartCount:       2
Parts:
  - Name:            PSV0
    Size:            144
    PSVInfo:
      Version:         1
      ShaderStage:     5
      MinimumWaveLaneCount: 0
      MaximumWaveLaneCount: 4294967295
      UsesViewID:      0
      SigInputVectors: 0
      SigOutputVectors: [ 8, 16, 32, 64 ]
      NumThreadsX:     512
      NumThreadsY:     1024
      NumThreadsZ:     2048
      ResourceStride:       16
      Resources:
        - Type:            Sampler
          Space:           2
          LowerBound:      3
          UpperBound:      4
        - Type:            Invalid
          Space:           32768
          LowerBound:      8388608
          UpperBound:      2147483648
      SigInputElements: []
      SigOutputElements: []
      SigPatchOrPrimElements: []
      InputOutputMap:
        - [  ]
        - [  ]
        - [  ]
        - [  ]
  - Name:            DXIL
    Size:            24
    Program:
      MajorVersion:    6
      MinorVersion:    0
      ShaderKind:      5
      Size:            6
      DXILMajorVersion: 0
      DXILMinorVersion: 1
      DXILSize:        0
...

# The round-tripped YAML should not contain NumThreads fields for PSV v1.
# ROUNDTRIP:     Version:         1
# ROUNDTRIP:     SigOutputVectors:
# ROUNDTRIP-NOT: NumThreadsX
# ROUNDTRIP-NOT: NumThreadsY
# ROUNDTRIP-NOT: NumThreadsZ
# ROUNDTRIP:     ResourceStride:  16
