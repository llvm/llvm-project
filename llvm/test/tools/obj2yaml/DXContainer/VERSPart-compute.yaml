# RUN: yaml2obj %s 2>&1 | obj2yaml 2>&1 | FileCheck %s

--- !dxcontainer
Header:
  Hash:            [ 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0, 0x0,
                     0x0, 0x0, 0x0, 0x0, 0x0, 0x0 ]
  Version:
    Major:           1
    Minor:           0
  FileSize:        144
  PartCount:       1
  PartOffsets:     [36]
Parts:
  - Name:            VERS
    Size:            100
    CompilerVersion:
...

#CHECK:        - Name:            VERS
#CHECK-NEXT:     Size:            100
#CHECK-NEXT:     CompilerVersion:
#CHECK-NEXT:       Major:           {{[0-9][0-9]+}}
#CHECK-NEXT:       Minor:           {{[0-9]+}}
#CHECK-NEXT:       IsDebugBuild:    {{true|false}}
#CHECK-NEXT:       IsValidated:     false
#CHECK-NEXT:       CommitCount:     {{[0-9]+}}
#CHECK-NEXT:       ContentSizeInBytes: {{[0-9]+}}
#CHECK-NEXT:       CommitSha:       {{[0-9a-f]*}}
#CHECK-NEXT:       CustomVersionString: {{.*}}
