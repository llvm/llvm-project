# CHECK-NEXT:   }
# CHECK-NEXT:   Symbol {
# CHECK-NEXT:     Name: sym
# CHECK-NEXT:     Value: 0
# CHECK-NEXT:     Section: .data (2)
# CHECK-NEXT:     BaseType: Null (0x0)
# CHECK-NEXT:     ComplexType: Null (0x0)
