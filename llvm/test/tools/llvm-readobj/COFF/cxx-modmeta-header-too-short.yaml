# RUN: yaml2obj %s -o %t
# RUN: llvm-readobj --coff-cxx-module-metadata %t 2>&1 | FileCheck %s

# CHECK: warning: {{.*}} insufficient size: got 5, expected more than 8

--- !COFF
header:
  Machine:         IMAGE_FILE_MACHINE_AMD64
  Characteristics: [  ]
sections:
  - Name:            .modmeta
    Characteristics: [ IMAGE_SCN_LNK_INFO, IMAGE_SCN_LNK_REMOVE ]
    Alignment:       1
    SectionData:     '0100010118'
    SizeOfRawData:   5
symbols:
...
