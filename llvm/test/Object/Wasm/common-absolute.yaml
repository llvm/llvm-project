# RUN: yaml2obj %s | not llvm-objdump -s - 2>&1 | FileCheck %s

# Check that a common data symbol cannot be marked as absolute.

# CHECK: common symbols cannot be absolute: foo

--- !WASM
FileHeader:
  Version:         0x00000001
Sections:
  - Type:            CUSTOM
    Name:            linking
    Version:         2
    SymbolTable:
      - Index:           0
        Kind:            DATA
        Name:            foo
        Flags:           [ BINDING_COMMON, ABSOLUTE ]
        Size:            4
        Align:           4
...
