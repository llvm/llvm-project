  'lld.mapfile.diff': 'Linker Map Diff',
  'offload.binary.inspect': 'Offload Binary',
  'runtime.correlate': 'Runtime Correlation',
  'runtime.summary': 'Runtime Summary',
  'build.compile_commands': 'Compile Commands',
};

const friendlyCapabilityName = (id, fallback) => {
  if (capabilityFriendlyNames[id]) return capabilityFriendlyNames[id];
  if (fallback) return fallback;
  return titleCase(id);
};

// --- Fuzzy Search ---
const fuzzyMatch = (query, text) => {
  if (!query) return { score: 1, matches: [] };
  const q = query.toLowerCase();
  const t = text.toLowerCase();
  let qi = 0, ti = 0, score = 0, matches = [];
  while (qi < q.length && ti < t.length) {
    if (q[qi] === t[ti]) {
      if (ti === 0 || t[ti - 1] === '/' || t[ti - 1] === '_' || t[ti - 1] === '-') score += 3;
      else score += 1;
      matches.push(ti);
      qi++;
    }
    ti++;
  }
  if (qi < q.length) return null;
  // Penalize length difference
  score -= (t.length - q.length) * 0.1;
  return { score, matches };
};

// --- Syntax Highlighting (lightweight inline) ---
const Syntax = {
  highlightLLVMIR(text) {
    return this._tokenize(text, [
      { re: /;.*$/, cls: 'sh-comment' },
      { re: /\b(define|declare|attributes|target|module|source_filename)\b/, cls: 'sh-keyword' },
      { re: /\b(i\d+|half|bfloat|float|double|fp128|x86_fp80|ppc_fp128|x86_mmx|void|label|metadata|token|ptr)\b/, cls: 'sh-type' },
      { re: /\b(alloca|load|store|getelementptr|insertvalue|extractvalue|icmp|fcmp|phi|select|call|invoke|ret|br|switch|indirectbr|resume|unreachable|landingpad|catchpad|cleanuppad|add|fadd|sub|fsub|mul|fmul|udiv|sdiv|fdiv|urem|srem|frem|shl|lshr|ashr|and|or|xor)\b/, cls: 'sh-function' },
      { re: /@[\w.$-]+/, cls: 'sh-label' },
      { re: /%[\w.$-]+/, cls: 'sh-operator' },
      { re: /-?\d+\.?\d*/, cls: 'sh-number' },
      { re: /"(?:\\.|[^"])*"/, cls: 'sh-string' },
    ]);
  },
  highlightAsm(text) {
    return this._tokenize(text, [
      { re: /[#;].*$/, cls: 'sh-comment' },
      { re: /^\s*\.[a-zA-Z]+/, cls: 'sh-directive' },
      { re: /^[a-zA-Z_][\w.]*:/, cls: 'sh-label' },
      { re: /\b(mov|push|pop|lea|call|ret|jmp|je|jne|jg|jl|jge|jle|ja|jb|add|sub|mul|div|and|or|xor|not|neg|inc|dec|shl|shr|sar|cmp|test|nop|int|syscall|leave|enter|ld|st)\b/, cls: 'sh-keyword' },
      { re: /\b(rax|rbx|rcx|rdx|rsi|rdi|rbp|rsp|r8|r9|r10|r11|r12|r13|r14|r15|eax|ebx|ecx|edx|esi|edi|ebp|esp|ax|bx|cx|dx|al|bl|cl|dl|ah|bh|ch|dh|xmm\d+|ymm\d+)\b/, cls: 'sh-type' },
      { re: /-?\d+\.?\d*/, cls: 'sh-number' },
      { re: /"(?:\\.|[^"])*"/, cls: 'sh-string' },
    ]);
  },
  highlightC(text) {
    return this._tokenize(text, [
      { re: /\/\/.*$|\/\*[\s\S]*?\*\//, cls: 'sh-comment' },
      { re: /\b(int|char|float|double|void|long|short|signed|unsigned|struct|union|enum|typedef|static|extern|inline|const|volatile|restrict|auto|register|sizeof|typeof|bool|true|false|nullptr|NULL)\b/, cls: 'sh-type' },
      { re: /\b(if|else|for|while|do|switch|case|default|break|continue|return|goto|try|catch|throw|new|delete|class|public|private|protected|virtual|override|template|namespace|using|friend|operator|explicit|implicit|constexpr|consteval|constinit|noexcept|decltype|typename|this|super)\b/, cls: 'sh-keyword' },
      { re: /\b[a-zA-Z_][\w]*\s*(?=\()/, cls: 'sh-function' },
      { re: /-?\d+\.?\d*[ulULfF]*\b/, cls: 'sh-number' },
      { re: /"(?:\\.|[^"])*"|'(?:\\.|[^'])*'/, cls: 'sh-string' },
      { re: /\#[ \t]*[a-zA-Z]+/, cls: 'sh-directive' },
    ]);
  },
  _tokenize(text, rules) {
    const lines = text.split('\n');
    return lines.map(line => {
      const parts = [];
      let pos = 0;
      while (pos < line.length) {
        let matched = false;
        for (const rule of rules) {
          rule.re.lastIndex = 0;
          const m = line.slice(pos).match(rule.re);
          if (m && m.index === 0) {
            parts.push(h('span', { class: rule.cls }, m[0]));
            pos += m[0].length;
            matched = true;
            break;
          }
        }
        if (!matched) {
          parts.push(document.createTextNode(line[pos]));
          pos++;
        }
      }
      const pre = h('pre', { class: 'code-line', style: { margin: 0, padding: '2px 12px' } });
      parts.forEach(p => pre.appendChild(typeof p === 'string' ? document.createTextNode(p) : p));
      return pre;
    });
  },
  codeBlock(text, lang) {
    const wrap = h('div', { class: 'code-content', style: { padding: '8px 0' } });
    if (lang === 'ir' || lang === 'llvm') {
      this.highlightLLVMIR(text).forEach(el => wrap.appendChild(el));
    } else if (lang === 'asm' || lang === 's') {
      this.highlightAsm(text).forEach(el => wrap.appendChild(el));
    } else if (lang === 'c' || lang === 'cpp' || lang === 'cc') {
      this.highlightC(text).forEach(el => wrap.appendChild(el));
    } else {
      wrap.appendChild(h('pre', { class: 'raw-json' }, text));
    }
    return wrap;
  },
};

// --- Capability Data Processing ---
const scalarMetricKeys = new Set([
  'errors', 'warnings', 'notes', 'count', 'remark_count', 'function_count', 'functions',
  'instructions', 'instruction_count', 'globals', 'global_count', 'sections', 'symbols', 'symbol_count',
  'compile_units', 'max_depth', 'total_headers', 'total_functions',
  'trace_event_count', 'duration_us', 'wall_time_ns', 'basic_blocks',
  'call_count', 'intrinsic_call_count', 'phi_count', 'memory_op_count',
  'kernel_count', 'transfer_count', 'sync_count', 'bytes', 'size'
]);

const preferredMetricOrder = [
  'instructions', 'instruction_count', 'functions', 'function_count',
  'warnings', 'errors', 'remarks', 'remark_count', 'symbols', 'symbol_count',
  'sections', 'compile_units', 'total_headers', 'trace_event_count',
  'duration_us', 'wall_time_ns', 'memory_op_count', 'call_count',
  'basic_blocks', 'global_count'
];

const ignoredMetricKeys = new Set([
  'available', 'capability', 'unit_id', 'snapshot_id', 'source_path',
  'directory', 'reason', 'summary', 'module', 'remarks_path', 'object_path',
  'ir_path', 'kind', 'format', 'arch', 'tool', 'input', 'stdout', 'stderr',
  'note', 'version'
]);

const CapabilityData = {
  category(capability) {
    const id = String(capability || '');
    if (id.startsWith('build.')) return 'Build';
    if (id.startsWith('clang.')) return 'Clang';
    if (id.startsWith('llvm.ir.') || id === 'llvm.inlining.tree' || id.startsWith('llvm.remarks.') || id.startsWith('llvm.pass.')) return 'IR';
    if (id.startsWith('llvm.obj.') || id.startsWith('llvm.debug.') || id === 'llvm.cgdata' || id.startsWith('lld.mapfile')) return 'Binary';
    if (id.startsWith('llvm.cfg') || id.startsWith('llvm.dom_tree') || id.startsWith('llvm.call_graph') || id.startsWith('llvm.loop_info') || id.startsWith('llvm.selection_dag') || id.startsWith('llvm.machine_ir') || id.startsWith('llvm.asm.') || id.startsWith('llvm.mca.') || id === 'llvm.exegesis') return 'Inspection';
    if (id.startsWith('llvm.lto.')) return 'LTO';
    if (id.startsWith('offload.')) return 'Offload';
    if (id.startsWith('runtime.')) return 'Runtime';
    return 'Other';
  },

  shouldQueryCapability(spec, scope = 'unit') {
    const id = spec?.id || spec?.capability_id || '';
    if (!id) return false;
    if (id === 'llvm.exegesis') return false;
    if (id === 'clang.template_stats' || id === 'clang.static_analysis') return false;
    if (id.startsWith('runtime.')) return false;
    if (id === 'llvm.ir.diff' || id === 'llvm.remarks.size_diff' || id === 'lld.mapfile.diff')
      return scope === 'compare';
    return true;
  },

  isAvailable(value) {
    if (!value || typeof value !== 'object') return false;
    return value.available !== false;
  },

  normalizeResults(results) {
    return (Array.isArray(results) ? results : []).map(result => {
      const value = result?.value && typeof result.value === 'object' ? result.value : {};
      return {
        capability: result?.capability || value.capability || 'unknown',
        cache: result?.cache || '',
        resultId: result?.result_id || '',
        value,
        available: this.isAvailable(value),
        reason: value.reason || result?.error || '',
        metrics: this.metrics(value),
        tables: this.tables(value),
        findings: this.findings(value),
        artifacts: this.artifacts(value),
      };
    });
  },

  metrics(value) {
    const metrics = {};
    if (!value || typeof value !== 'object') return metrics;
    for (const [key, raw] of Object.entries(value)) {
      if (ignoredMetricKeys.has(key)) continue;
      if (typeof raw === 'number' && (scalarMetricKeys.has(key) || !Array.isArray(raw)))
        metrics[key] = raw;
      else if (typeof raw === 'boolean')
        metrics[key] = raw ? 'yes' : 'no';
    }
    if (value.by_type && typeof value.by_type === 'object') {
      for (const [key, raw] of Object.entries(value.by_type))
        if (typeof raw === 'number') metrics[`type_${key}`] = raw;
    }
    return metrics;
  },

  tables(value) {
    const tables = [];
    if (!value || typeof value !== 'object') return tables;
    for (const [key, raw] of Object.entries(value)) {
      if (Array.isArray(raw) && raw.length && raw.every(item => item && typeof item === 'object'))
        tables.push({ name: key, rows: raw });
    }
    return tables;
  },

  findings(value) {
    if (!value || typeof value !== 'object') return [];
    if (Array.isArray(value.findings)) return value.findings;
    if (Array.isArray(value.diagnostics)) {
      return value.diagnostics.map(d => ({
        severity: d.level || d.severity || 'info',
        message: d.message || '',
        file: d.file || '',
        line: d.line,
        column: d.column,
        kind: 'diagnostic',
      }));
    }
    if (Array.isArray(value.remarks)) {
      return value.remarks.map(r => ({
        severity: r.type || 'remark',
        message: r.message || r.name || '',
        pass: r.pass,
        function: r.function,
        file: r.location?.file,
        line: r.location?.line,
        column: r.location?.column,
        hotness: r.hotness,
        kind: 'remark',
      }));
    }
    return [];
  },

  artifacts(value) {
    const artifacts = [];
    if (!value || typeof value !== 'object') return artifacts;
    for (const key of ['stdout', 'stderr', 'ir', 'assembly', 'preprocessed_source', 'text'])
      if (typeof value[key] === 'string' && value[key]) artifacts.push({ name: key, text: value[key] });
    if (value.traceEvents) artifacts.push({ name: 'traceEvents', data: value.traceEvents });
    return artifacts;
  },

  aggregate(unitResults) {
    const agg = {
      units: 0,
      instructions: 0,
      functions: 0,
      warnings: 0,
      errors: 0,
      remarks: 0,
      sections: 0,
      symbols: 0,
      unavailable: 0,
      metrics: {},
      capabilityCoverage: new Map(),
      familyCoverage: new Map(),
    };
    const rows = [];
    (Array.isArray(unitResults) ? unitResults : []).forEach(unit => {
      agg.units++;
      const row = { unit_id: unit.unit_id, source_path: unit.source_path, metrics: {}, results: unit.results || [] };
      this.normalizeResults(unit.results || []).forEach(result => {
        const family = this.category(result.capability);
        const capEntry = agg.capabilityCoverage.get(result.capability) || {
          capability: result.capability,
          family,
          queried: 0,
          available: 0,
          missing: 0,
          reason: '',
          metrics: {},
        };
        capEntry.queried++;
        if (result.available) capEntry.available++;
        else {
          agg.unavailable++;
          capEntry.missing++;
          if (!capEntry.reason) capEntry.reason = result.reason || '';
        }
        agg.capabilityCoverage.set(result.capability, capEntry);

        const familyEntry = agg.familyCoverage.get(family) || {
          family,
          queried: 0,
          available: 0,
          missing: 0,
          metrics: {},
        };
        familyEntry.queried++;
        if (result.available) familyEntry.available++;
        else familyEntry.missing++;
        agg.familyCoverage.set(family, familyEntry);

        const v = result.value;
        const trackExplicitly = new Set([
          'instructions', 'instruction_count', 'functions', 'function_count',
          'warnings', 'errors', 'remarks', 'remark_count',
        ]);
        if (result.available) {
          Object.entries(result.metrics || {}).forEach(([key, raw]) => {
            if (typeof raw !== 'number' || !Number.isFinite(raw)) return;
            agg.metrics[key] = (agg.metrics[key] || 0) + raw;
            capEntry.metrics[key] = (capEntry.metrics[key] || 0) + raw;
            familyEntry.metrics[key] = (familyEntry.metrics[key] || 0) + raw;
            if (!trackExplicitly.has(key)) {
              row.metrics[key] = (row.metrics[key] || 0) + raw;
              row[key] = row.metrics[key];
            }
          });
        }
        if (result.capability === 'llvm.ir.summary') {
          const inst = Number(v.instructions || v.instruction_count || 0);
          const fns = Number(v.functions || v.function_count || 0);
          agg.instructions += inst;
          agg.functions += fns;
          row.instructions = inst || row.instructions || 0;
          row.functions = fns || row.functions || 0;
        }
        if (result.capability === 'llvm.ir.function_stats') {
          const total = Array.isArray(v.functions) ? v.functions.reduce((s, f) => s + Number(f.instructions || f.instruction_count || 0), 0) : 0;
          row.instructions = row.instructions || total;
          agg.instructions += row.instructions && !(v.instructions || v.instruction_count) ? 0 : Number(v.instructions || v.instruction_count || 0);
        }
        if (result.capability === 'clang.diag.summary') {
          agg.warnings += Number(v.warnings || 0);
          agg.errors += Number(v.errors || 0);
          row.warnings = Number(v.warnings || 0);
          row.errors = Number(v.errors || 0);
        }
        if (result.capability === 'llvm.remarks.summary') {
          const cnt = Number(v.count || v.remark_count || 0);
          agg.remarks += cnt;
          row.remarks = cnt;
        }
        if (result.capability === 'llvm.obj.summary') {
          agg.sections += Number(v.sections || 0);
          agg.symbols += Number(v.symbols || v.symbol_count || 0);
          row.sections = Number(v.sections || 0);
          row.symbols = Number(v.symbols || v.symbol_count || 0);
        }
      });
      rows.push(row);
    });
    agg.rows = rows;
    // Override metrics with correctly-tracked per-capability values to avoid
    // double-counting (e.g. 'functions' from IR vs debug/AST capabilities).
    if (agg.instructions) agg.metrics.instructions = agg.instructions;
    if (agg.functions) agg.metrics.functions = agg.functions;
    if (agg.remarks) agg.metrics.remarks = agg.remarks;
    if (agg.warnings) agg.metrics.warnings = agg.warnings;
    if (agg.errors) agg.metrics.errors = agg.errors;
    delete agg.metrics.instruction_count;
    delete agg.metrics.function_count;
    delete agg.metrics.remark_count;
    agg.capabilities = Array.from(agg.capabilityCoverage.values()).sort((a, b) =>
      a.family === b.family ? a.capability.localeCompare(b.capability) : a.family.localeCompare(b.family)
    );
    agg.families = Array.from(agg.familyCoverage.values()).sort((a, b) => a.family.localeCompare(b.family));
    return agg;
  },

  coverage(specs, aggregate) {
    const coverage = new Map((aggregate?.capabilities || []).map(entry => [entry.capability, entry]));
    return (Array.isArray(specs) ? specs : [])
      .filter(spec => this.shouldQueryCapability(spec, 'snapshot'))
      .map(spec => {
        const id = spec.id || spec.capability_id;
        const entry = coverage.get(id);
        return {
          id,
          name: spec.name || id,
          readiness: spec.readiness_level || spec.readiness || '',
          family: this.category(id),
          queried: entry?.queried || 0,
          available: entry?.available || 0,
          missing: entry?.missing || 0,
          reason: entry?.reason || spec.summary || '',
        };
      });
  },

  selectMetrics(metrics, count = 4) {
    const source = metrics && typeof metrics === 'object' ? metrics : {};
    const aliases = {
      instruction_count: 'instructions', function_count: 'functions',
      remark_count: 'remarks', symbol_count: 'symbols', global_count: 'globals',
    };
    const merged = {};
    for (const [key, value] of Object.entries(source)) {
      if (typeof value !== 'number' || !Number.isFinite(value)) continue;
      const canonical = aliases[key] || key;
      merged[canonical] = (merged[canonical] || 0) + value;
    }
    const chosen = [];
    const seen = new Set();
    const canonicalOrder = [...new Set(preferredMetricOrder.map(k => aliases[k] || k))];
    canonicalOrder.forEach(key => {
      const value = merged[key];
      if (value == null) return;
      if (value === 0 && key !== 'errors' && key !== 'warnings') return;
      chosen.push({ key, label: titleCase(key), value });
      seen.add(key);
    });
    Object.entries(merged)
      .filter(([key, value]) => !seen.has(key) && typeof value === 'number' && Number.isFinite(value))
      .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
      .slice(0, Math.max(0, count - chosen.length))
      .forEach(([key, value]) => chosen.push({ key, label: titleCase(key), value }));
    return chosen.slice(0, count);
  },

  chartRows(result) {
    const value = result?.value || {};
    if (value.by_type && typeof value.by_type === 'object') {
      return Object.entries(value.by_type)
        .filter(([, raw]) => typeof raw === 'number' && Number.isFinite(raw))
        .map(([label, amount]) => ({ label, amount }));
    }
    const table = (result?.tables || []).find(t =>
      Array.isArray(t.rows) &&
      t.rows.length > 1 &&
      t.rows.length <= 16 &&
      t.rows.every(row => row && typeof row === 'object')
    );
    if (!table) return [];
    const sample = table.rows[0];
    const labelKey = ['name', 'type', 'kind', 'pass', 'function', 'section'].find(key => key in sample);
    const valueKey = Object.keys(sample).find(key => typeof sample[key] === 'number');
    if (!labelKey || !valueKey) return [];
    return table.rows
      .filter(row => typeof row[valueKey] === 'number')
      .map(row => ({ label: row[labelKey], amount: row[valueKey] }));
  },
};

// --- UI Components ---
const UI = {
  metric(label, value, subtext, cls) {
    return html`<div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${typeof value === 'number' ? formatNumber(value) : value}</div>
      ${subtext ? html`<div class="delta ${cls || 'neutral'}">${subtext}</div>` : null}
    </div>`;
  },

  dataTable(rows, options = {}) {
    const list = Array.isArray(rows) ? rows : [];
    if (!list.length) return html`<div class="empty-state"><div>No rows</div></div>`;
    const columns = options.columns || Object.keys(list[0]).slice(0, 8);
    return h('div', { class: 'data-table-wrap' },
      h('table', { class: 'data-table' },
        h('thead', {}, h('tr', {}, columns.map(c => h('th', {}, titleCase(c))))),
        h('tbody', {}, list.slice(0, options.limit || 200).map(row =>
          h('tr', {}, columns.map(c => h('td', { class: typeof row[c] === 'number' ? 'mono number' : '' }, row[c] == null ? '–' : String(row[c]))))
        ))
      )
    );
  },

  findingList(findings) {
    const list = Array.isArray(findings) ? findings : [];
    if (!list.length) return html`<div class="empty-state"><div>No findings</div></div>`;
    return h('div', { class: 'finding-list' }, list.slice(0, 300).map(f => {
      const sev = String(f.severity || f.level || 'info').toLowerCase();
      const loc = [f.file, f.line, f.column].filter(v => v != null && v !== '').join(':');
      return h('div', { class: `finding-row ${sev}` },
        h('span', { class: `severity-badge ${sev}` }, sev),
        h('div', { class: 'finding-body' },
          h('div', { class: 'finding-message' }, f.message || f.name || '(no message)'),
          h('div', { class: 'finding-meta mono' }, [f.pass, f.function, loc, f.hotness != null ? `hotness ${f.hotness}` : ''].filter(Boolean).join(' · '))
        )
      );
    }));
  },

  barChart(rows, options = {}) {
    const list = Array.isArray(rows) ? rows : [];
    if (!list.length) return null;
    const max = Math.max(...list.map(item => Number(item.amount) || 0), 1);
    const colors = options.colors || ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B', '#6EC9C4', '#F0E8B8', '#D6C5E8', '#E8D6B8', '#E8B8C5'];
    return h('div', { class: 'bar-chart' }, list.slice(0, options.limit || 12).map((item, i) =>
      h('div', { class: 'bar-row' },
        h('div', { class: 'bar-label', title: item.label }, item.label),
        h('div', { class: 'bar-track' },
          h('div', {
            class: 'bar-fill',
            style: { width: `${(Number(item.amount) || 0) === 0 ? 0 : Math.max(6, Math.round((Number(item.amount) || 0) / max * 100))}%`, background: item.color || colors[i % colors.length] }
          })
        ),
        h('div', { class: 'bar-value mono' }, formatNumber(item.amount))
      )
    ));
  },

  passTimeline(remarks) {
    const list = (Array.isArray(remarks) ? remarks : []).filter(r => r.pass);
    if (!list.length) return null;
    const byPass = new Map();
    list.forEach(r => {
      const p = r.pass;
      if (!byPass.has(p)) byPass.set(p, { pass: p, count: 0, hotness: 0 });
      byPass.get(p).count++;
      byPass.get(p).hotness += Number(r.hotness || 0);
    });
    const entries = Array.from(byPass.values()).sort((a, b) => b.count - a.count);
    const max = Math.max(...entries.map(e => e.count), 1);
    const colors = ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B'];
    return h('div', { class: 'bar-chart' }, entries.slice(0, 10).map((e, i) =>
      h('div', { class: 'bar-row' },
        h('div', { class: 'bar-label', title: e.pass }, e.pass),
        h('div', { class: 'bar-track' },
          h('div', {
            class: 'bar-fill',
            style: { width: `${Math.max(6, Math.round(e.count / max * 100))}%`, background: colors[i % colors.length] }
          })
        ),
        h('div', { class: 'bar-value mono' }, `${e.count}${e.hotness ? ' · h:' + formatNumber(e.hotness) : ''}`)
      )
    ));
  },

  flameBars(items, options = {}) {
    const list = Array.isArray(items) ? items : [];
    if (!list.length) return null;
    const total = list.reduce((s, it) => s + (Number(it.value) || 0), 0) || 1;
    const colors = ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B', '#6EC9C4'];
    return h('div', { class: 'flame-bar', style: { gap: '2px', margin: '8px 0' } },
      list.slice(0, options.limit || 20).map((it, i) => {
        const pct = ((Number(it.value) || 0) / total) * 100;
        return h('div', {
          class: 'flame-bar-segment',
          style: { width: `${pct}%`, background: it.color || colors[i % colors.length] }
        }, h('span', { title: `${it.label}: ${formatNumber(it.value)} (${pct.toFixed(1)}%)` }, it.label));
      })
    );
  },

  errorCard(message, onRetry) {
    return h('div', { class: 'empty-state', style: { padding: '24px' } },
      h('div', {}, 'Something went wrong'),
      h('div', { class: 'reason mono' }, message || 'Unknown error'),
      onRetry ? h('button', { class: 'retry-btn', onClick: onRetry }, 'Retry') : null
    );
  },

  capabilityPanel(result) {
    const nodes = [];
    if (!result.available)
      nodes.push(html`<div class="empty-state"><div>${result.reason || 'Capability unavailable'}</div></div>`);
    const metricEntries = Object.entries(result.metrics || {});
    if (metricEntries.length) {
      nodes.push(h('div', { class: 'mini-metrics' }, metricEntries.slice(0, 12).map(([k, v]) =>
        h('div', { class: 'mini-metric' }, h('span', {}, titleCase(k)), h('strong', { class: 'mono' }, typeof v === 'number' ? formatNumber(v) : String(v)))
      )));
    }
    const chart = CapabilityData.chartRows(result);
    if (chart.length)
      nodes.push(this.barChart(chart));
    if (result.findings.length) nodes.push(this.findingList(result.findings));
    result.tables.slice(0, 2).forEach(t => nodes.push(html`<div class="table-title">${titleCase(t.name)}</div>`, this.dataTable(t.rows)));
    if (!nodes.length) {
      const raw = result.value || {};
      const rawEntries = Object.entries(raw).filter(([k, v]) => !ignoredMetricKeys.has(k) && v != null && typeof v !== 'object');
      if (rawEntries.length) {
        nodes.push(h('div', { class: 'mini-metrics' }, rawEntries.slice(0, 16).map(([k, v]) =>
          h('div', { class: 'mini-metric' }, h('span', {}, titleCase(k)), h('strong', { class: 'mono' }, typeof v === 'number' ? formatNumber(v) : String(v)))
        )));
      } else {
        nodes.push(html`<div class="empty-state"><div>No data to display for this capability.</div></div>`);
      }
    }
    return h('div', { class: 'capability-panel' }, nodes);
  },

  donutChart(data, options = {}) {
    const list = Array.isArray(data) ? data : [];
    if (!list.length) return null;
    const total = list.reduce((s, d) => s + (Number(d.value) || 0), 0) || 1;
    const colors = options.colors || ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B'];
    const size = options.size || 120;
    const r = (size - 8) / 2;
    const cx = size / 2;
    const cy = size / 2;
    const circ = 2 * Math.PI * r;
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', String(size));
    svg.setAttribute('height', String(size));
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

    let offset = -circ / 4;
    list.forEach((d, i) => {
      const val = Number(d.value) || 0;
      const pct = val / total;
      const dash = pct * circ;
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', colors[i % colors.length]);
      circle.setAttribute('stroke-width', '10');
      circle.setAttribute('stroke-dasharray', `${dash.toFixed(2)} ${(circ - dash).toFixed(2)}`);
      circle.setAttribute('stroke-dashoffset', offset.toFixed(2));
      circle.setAttribute('stroke-linecap', 'round');
      circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
      svg.appendChild(circle);
      offset -= dash;
    });

    const legend = h('div', { class: 'overview-donut-legend' });
    list.forEach((d, i) => {
      const pct = total ? Math.round((Number(d.value) || 0) / total * 100) : 0;
      legend.appendChild(h('span', {},
        h('i', { style: { background: colors[i % colors.length] } }),
        `${d.label} · ${pct}%`
      ));
    });

    return h('div', { class: 'overview-donut' }, svg, legend);
  },

  sparkline(data, options = {}) {
    const list = Array.isArray(data) ? data : [];
    if (list.length < 2) return null;
    const w = options.width || 280;
    const h = options.height || 60;
    const pad = 4;
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', String(w));
    svg.setAttribute('height', String(h));
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    const color = options.color || 'var(--accent)';

    const values = list.map(d => Number(d.value) || 0);
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const range = max - min || 1;
    const step = (w - pad * 2) / (list.length - 1);

    const points = list.map((_, i) => {
      const x = pad + i * step;
      const y = h - pad - ((values[i] - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });

    const areaPoints = `${points[0].split(',')[0]},${h - pad} ` + points.join(' ') + ` ${points[points.length - 1].split(',')[0]},${h - pad}`;
    const area = document.createElementNS(svgNS, 'polygon');
    area.setAttribute('points', areaPoints);
    area.setAttribute('fill', color);
    area.setAttribute('opacity', '0.12');
    svg.appendChild(area);

    const poly = document.createElementNS(svgNS, 'polyline');
    poly.setAttribute('points', points.join(' '));
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', color);
    poly.setAttribute('stroke-width', '2');
    poly.setAttribute('stroke-linejoin', 'round');
    poly.setAttribute('stroke-linecap', 'round');
    svg.appendChild(poly);

    list.forEach((_, i) => {
      const [x, y] = points[i].split(',');
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', '2.5');
      circle.setAttribute('fill', color);
      svg.appendChild(circle);
    });

    return svg;
  },

  radarChart(axes, options = {}) {
    const list = Array.isArray(axes) ? axes.filter(a => a.label) : [];
    if (list.length < 3) return null;
    const size = options.size || 200;
    const cx = size / 2, cy = size / 2;
    const radius = (size - 60) / 2;
    const color = options.color || 'var(--accent)';
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', String(size));
    svg.setAttribute('height', String(size));
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

    const n = list.length;
    const angleStep = (2 * Math.PI) / n;
    const vertex = (i, r) => {
      const a = -Math.PI / 2 + i * angleStep;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    };

    [0.33, 0.66, 1].forEach(pct => {
      const pts = Array.from({ length: n }, (_, i) => vertex(i, radius * pct).map(v => v.toFixed(1)).join(',')).join(' ');
      const poly = document.createElementNS(svgNS, 'polygon');
      poly.setAttribute('points', pts);
      poly.setAttribute('fill', 'none');
      poly.setAttribute('stroke', 'var(--border)');
      poly.setAttribute('stroke-width', '1');
      svg.appendChild(poly);
    });

    list.forEach((_, i) => {
      const [x, y] = vertex(i, radius);
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', cx); line.setAttribute('y1', cy);
      line.setAttribute('x2', x.toFixed(1)); line.setAttribute('y2', y.toFixed(1));
      line.setAttribute('stroke', 'var(--border)');
      line.setAttribute('stroke-width', '1');
      svg.appendChild(line);
    });

    const dataPts = list.map((a, i) => {
      const pct = a.max > 0 ? Math.min(a.value / a.max, 1) : 0;
      return vertex(i, radius * pct).map(v => v.toFixed(1)).join(',');
    }).join(' ');
    const dataPoly = document.createElementNS(svgNS, 'polygon');
    dataPoly.setAttribute('points', dataPts);
    dataPoly.setAttribute('fill', color);
    dataPoly.setAttribute('fill-opacity', '0.15');
    dataPoly.setAttribute('stroke', color);
    dataPoly.setAttribute('stroke-width', '2');
    svg.appendChild(dataPoly);

    list.forEach((a, i) => {
      const [x, y] = vertex(i, radius + 16);
      const text = document.createElementNS(svgNS, 'text');
      text.setAttribute('x', x.toFixed(1));
      text.setAttribute('y', y.toFixed(1));
      text.setAttribute('text-anchor', x < cx - 5 ? 'end' : x > cx + 5 ? 'start' : 'middle');
      text.setAttribute('dominant-baseline', y < cy - 5 ? 'auto' : y > cy + 5 ? 'hanging' : 'middle');
      text.setAttribute('font-size', '10');
      text.setAttribute('fill', 'var(--fg2)');
      text.setAttribute('font-family', 'var(--mono)');
      text.textContent = a.label;
      svg.appendChild(text);
    });

    return h('div', { class: 'radar-chart' }, svg);
  },

  deltaBar(items, options = {}) {
    const list = Array.isArray(items) ? items : [];
    if (!list.length) return null;
    const maxAbs = Math.max(...list.map(it => Math.abs(it.delta ?? (it.after - it.before))), 1);
    return h('div', { class: 'delta-bar' }, list.slice(0, options.limit || 12).map(item => {
      const delta = item.delta ?? ((item.after || 0) - (item.before || 0));
      const pct = Math.min(Math.abs(delta) / maxAbs * 50, 50);
      const cls = delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
      const sign = delta > 0 ? '+' : '';
      return h('div', { class: 'delta-row' },
        h('div', { class: 'delta-label' }, item.label || ''),
        h('div', { class: 'delta-track' },
          h('div', { class: 'delta-center' }),
          delta !== 0 ? h('div', {
            class: `delta-fill ${cls}`,
            style: { width: `${pct}%`, ...(delta < 0 ? { right: '50%' } : { left: '50%' }) }
          }) : null
        ),
        h('div', { class: `delta-value ${cls}` }, delta === 0 ? '0' : `${sign}${formatNumber(delta)}`)
      );
    }));
  },

  heatmapGrid(rows, cols, getData, options = {}) {
    if (!rows.length || !cols.length) return null;
    const cellSize = options.cellSize || 24;
    const labelW = 100, labelH = 60;
    const w = labelW + cols.length * cellSize;
    const ht = labelH + rows.length * cellSize;
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', String(Math.min(w, 600)));
    svg.setAttribute('viewBox', `0 0 ${w} ${ht}`);
    svg.style.maxWidth = '100%';

    cols.forEach((col, ci) => {
      const text = document.createElementNS(svgNS, 'text');
      const x = labelW + ci * cellSize + cellSize / 2;
      text.setAttribute('x', String(x));
      text.setAttribute('y', String(labelH - 6));
      text.setAttribute('text-anchor', 'end');
      text.setAttribute('transform', `rotate(-45 ${x} ${labelH - 6})`);
      text.setAttribute('font-size', '9');
      text.setAttribute('fill', 'var(--fg3)');
      text.setAttribute('font-family', 'var(--mono)');
      text.textContent = col.length > 12 ? col.slice(0, 11) + '…' : col;
      svg.appendChild(text);
    });

    rows.forEach((row, ri) => {
      const text = document.createElementNS(svgNS, 'text');
      text.setAttribute('x', String(labelW - 6));
      text.setAttribute('y', String(labelH + ri * cellSize + cellSize / 2 + 3));
      text.setAttribute('text-anchor', 'end');
      text.setAttribute('font-size', '9');
      text.setAttribute('fill', 'var(--fg3)');
      text.setAttribute('font-family', 'var(--mono)');
      text.textContent = row.length > 14 ? row.slice(0, 13) + '…' : row;
      svg.appendChild(text);

      cols.forEach((col, ci) => {
        const val = getData(ri, ci);
        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('x', String(labelW + ci * cellSize + 1));
        rect.setAttribute('y', String(labelH + ri * cellSize + 1));
        rect.setAttribute('width', String(cellSize - 2));
        rect.setAttribute('height', String(cellSize - 2));
        rect.setAttribute('rx', '3');
        rect.setAttribute('fill', val > 0 ? `rgba(48,209,198,${Math.min(val, 1) * 0.7 + 0.15})` : 'var(--bg3)');
        rect.setAttribute('class', 'heatmap-cell');
        const title = document.createElementNS(svgNS, 'title');
        title.textContent = `${row} × ${col}: ${val > 0 ? 'available' : 'missing'}`;
        rect.appendChild(title);
        svg.appendChild(rect);
      });
    });

    return h('div', { class: 'heatmap-grid' }, svg);
  },

  inspectResult(result) {
    if (!result || typeof result !== 'object')
      return html`<div class="empty-state"><div>No inspection result</div></div>`;

    if (result.baseline && result.candidate) {
      const baseline = CapabilityData.normalizeResults([{ capability: result.capability, value: result.baseline.value }])[0];
      const candidate = CapabilityData.normalizeResults([{ capability: result.capability, value: result.candidate.value }])[0];
      return h('div', { class: 'capability-stack' },
        h('section', { class: 'capability-card' },
          h('div', { class: 'capability-card-title mono' }, `Baseline · ${(result.baseline_snapshot_id || '').slice(0, 8)}`),
          this.capabilityPanel(baseline)
        ),
        h('section', { class: 'capability-card' },
          h('div', { class: 'capability-card-title mono' }, `Candidate · ${(result.snapshot_id || '').slice(0, 8)}`),
          this.capabilityPanel(candidate)
        ),
        h('section', { class: 'capability-card' },
          h('div', { class: 'capability-card-title mono' }, 'Diff'),
          this.capabilityPanel({
            capability: result.capability,
            available: true,
            value: result.diff || {},
            metrics: CapabilityData.metrics(result.diff || {}),
            tables: CapabilityData.tables(result.diff || {}),
            findings: CapabilityData.findings(result.diff || {}),
            artifacts: CapabilityData.artifacts(result.diff || {}),
          })
        )
      );
    }

    if (Array.isArray(result.signals)) {
      const normalized = result.signals.map(entry =>
        CapabilityData.normalizeResults([{ capability: entry.capability, value: entry.value }])[0]
      );
      return h('div', { class: 'capability-stack' }, normalized.map(entry =>
        h('section', { class: 'capability-card' },
          h('div', { class: 'capability-card-title mono' }, friendlyCapabilityName(entry.capability)),
          this.capabilityPanel(entry)
        )
      ));
    }

    if (result.value) {
      const normalized = CapabilityData.normalizeResults([{ capability: result.capability, value: result.value }])[0];
      return h('div', { class: 'capability-stack' },
        h('section', { class: 'capability-card' },
          h('div', { class: 'capability-card-title mono' }, `${friendlyCapabilityName(result.capability)} · ${result.source_path || result.unit_selector || ''}`.trim()),
          this.capabilityPanel(normalized)
        )
      );
    }

    return html`<div class="empty-state"><div>No data available</div></div>`;
  },
};

  </script>
  <script>
/* ============================================================
   LLVM Advisor — Shell (Topbar, Sidebar, Detail Panel)
   ============================================================ */

const Shell = {
  init() {
    const app = document.getElementById('app');
    clearEl(app);
    Theme.init();
    app.appendChild(this.topbar());
    app.appendChild(this.sidebar());
    const wrap = h('div', { id: 'main-wrap' },
      h('div', { id: 'main' }),
      h('div', { id: 'detail-panel' })
    );
    app.appendChild(wrap);
    app.appendChild(CommandPalette.render());

    // React to state
    State.on('sidebarPinned', v => app.classList.toggle('sb-exp', v));
    State.on('detailOpen', v => app.classList.toggle('detail-open', v));
    State.on('commandPaletteOpen', v => {
      document.querySelector('.cmd-overlay')?.classList.toggle('open', v);
      if (v) document.querySelector('.cmd-input')?.focus();
    });
    State.on('route', () => this.updateNav());
    State.on('health', h => this.updateStatus(h));

    // Load initial data
    this.loadData();
  },

  async loadData() {
    const [health, snaps] = await Promise.all([API.health(), API.snapshots()]);
    if (health.ok) State.set('health', health.data);
    if (snaps.ok) {
      const list = Array.isArray(snaps.data) ? snaps.data : [];
      list.sort((a, b) => (b.created_unix || 0) - (a.created_unix || 0));
      State.set('snapshots', list);
      if (list.length > 0 && !State.get('currentSnapshot')) {
        State.set('currentSnapshot', list[0]);
        this.updateSelectors();
        Router.resolve();
        return;
      }
    }
    this.updateSelectors();
  },

  topbar() {
    return h('header', { id: 'topbar' },
      h('div', { class: 'wordmark', onClick: () => Router.navigate('/') }, 'llvm-advisor'),
      h('div', { class: 'topbar-center' },
        h('div', { class: 'dropdown', id: 'snapshot-dropdown' },
          h('button', { class: 'dd-trigger', onClick: e => this.toggleDropdown(e) }, 'Snapshot ▾'),
          h('div', { class: 'dd-menu' })
        )
      ),
      h('div', { class: 'topbar-right' },
        h('div', { class: 'status-pill', id: 'status-pill' },
          h('span', { class: 'status-dot ok' }),
          h('span', {}, 'connecting…')
        ),
        h('button', { class: 'theme-toggle', id: 'theme-toggle', title: 'Toggle theme', onClick: () => { Theme.toggle(); this.updateThemeIcon(); } },
          renderIcon(Icons[Theme.icon()])
        ),
        h('button', { class: 'mono', style: { fontSize: '12px', color: 'var(--text-muted)' },
          onClick: () => State.set('commandPaletteOpen', true) }, '?')
      )
    );
  },

  sidebar() {
    const items = [
      { icon: 'overview', label: 'Overview', route: '/', shortcut: 'g o' },
      { icon: 'units', label: 'Units', route: '/units', shortcut: 'g u' },
      { icon: 'compare', label: 'Compare', route: '/compare', shortcut: 'g c' },
      { icon: 'timeline', label: 'Timeline', route: '/timeline', shortcut: 'g t' },
      { icon: 'insights', label: 'Insights', route: '/insights', shortcut: 'g i' },
      { icon: 'settings', label: 'Settings', route: '/settings', shortcut: 'g s' },
    ];

    const nav = h('nav', {});
    items.forEach(item => {
      nav.appendChild(h('div', {
        class: 'nav-item', 'data-route': item.route, title: `${item.label} (${item.shortcut})`,
        onClick: () => Router.navigate(item.route)
      }, renderIcon(Icons[item.icon]), h('span', { class: 'nav-label' }, item.label)));
    });

    const footer = h('div', { class: 'sidebar-footer' },
      h('div', { id: 'sidebar-version' }, 'llvm-advisor'),
    );

    const pinBtn = h('div', {
      class: 'nav-item', title: 'Pin sidebar',
      onClick: () => State.set('sidebarPinned', !State.get('sidebarPinned'))
    }, renderIcon(Icons.pin), h('span', { class: 'nav-label' }, 'Pin'));

    const sb = h('aside', { id: 'sidebar' }, nav, pinBtn, footer);
    sb.addEventListener('mouseenter', () => { if (!State.get('sidebarPinned')) sb.parentElement.classList.add('sb-exp'); });
    sb.addEventListener('mouseleave', () => { if (!State.get('sidebarPinned')) sb.parentElement.classList.remove('sb-exp'); });
    return sb;
  },

  updateNav() {
    const route = State.get('route');
    document.querySelectorAll('.nav-item[data-route]').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });
  },

  updateStatus(health) {
    const pill = document.getElementById('status-pill');
    if (!pill || !health) return;
    const dot = pill.querySelector('.status-dot');
    const text = pill.querySelector('span:last-child');
    dot.className = 'status-dot ' + (health.ok !== false ? 'ok' : 'err');
    text.textContent = health.ok !== false ? `serving · ${health.snapshots ?? 0} snaps` : 'error';
  },

  updateThemeIcon() {
    const icon = document.querySelector('#theme-toggle .icon');
    if (icon) icon.innerHTML = Icons[Theme.icon()];
  },

  updateSelectors() {
    const snapMenu = document.querySelector('#snapshot-dropdown .dd-menu');
    if (!snapMenu) return;
    const snaps = State.get('snapshots') || [];
    clearEl(snapMenu);
    if (snaps.length === 0) {
      snapMenu.appendChild(h('div', { class: 'dd-item text-muted' }, 'No snapshots'));
      return;
    }
    snaps.forEach(s => {
      snapMenu.appendChild(h('div', {
        class: 'dd-item' + (State.get('currentSnapshot')?.id === s.id ? ' selected' : ''),
        onClick: () => { State.set('currentSnapshot', s); this.closeDropdowns(); Router.resolve(); }
      }, `${(s.id || '').slice(0, 8)} · ${timeAgo(s.created_unix)}`));
    });
  },

  toggleDropdown(e) {
    const dd = e.target.closest('.dropdown');
    const wasOpen = dd.classList.contains('open');
    this.closeDropdowns();
    if (!wasOpen) dd.classList.add('open');
  },

  closeDropdowns() {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  },

  renderMain(content) {
    const main = document.getElementById('main');
    if (!main) return;
    clearEl(main);
    if (typeof content === 'string') {
      const pre = document.createElement('pre');
      pre.textContent = content;
      main.appendChild(pre);
    } else if (content) {
      main.appendChild(content);
    }
  },

  renderDetail(content, title) {
    const panel = document.getElementById('detail-panel');
    if (!panel) return;
    clearEl(panel);
    if (!content) { State.set('detailOpen', false); return; }

    const card = h('div', { class: 'detail-card' });
    const header = h('div', { class: 'detail-card-header' },
      h('span', { class: 'detail-card-title' }, title || 'Details'),
      h('button', {
        class: 'detail-card-close',
        onClick: () => State.set('detailOpen', false),
        title: 'Close'
      }, '×')
    );
    const body = h('div', { class: 'detail-card-body' });
    body.appendChild(content);

    card.appendChild(header);
    card.appendChild(body);
    panel.appendChild(card);
    State.set('detailOpen', true);
  },
};

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown')) Shell.closeDropdowns();
});

/* --- Command Palette --- */
const CommandPalette = {
  commands: [
    { label: 'Go to Overview', shortcut: 'g o', action: () => Router.navigate('/') },
    { label: 'Go to Units', shortcut: 'g u', action: () => Router.navigate('/units') },
    { label: 'Go to Compare', shortcut: 'g c', action: () => Router.navigate('/compare') },
    { label: 'Go to Timeline', shortcut: 'g t', action: () => Router.navigate('/timeline') },
    { label: 'Go to Insights', shortcut: 'g i', action: () => Router.navigate('/insights') },
    { label: 'Go to Settings', shortcut: 'g s', action: () => Router.navigate('/settings') },
  ],

  render() {
    const results = h('div', { class: 'cmd-results' });

      results.appendChild(h('div', {
        class: 'cmd-item' + (i === 0 ? ' selected' : ''),
        onClick: () => { cmd.action(); State.set('commandPaletteOpen', false); }

        h('span', { class: 'cmd-shortcut' }, cmd.shortcut)

    const input = h('input', { class: 'cmd-input', placeholder: 'Type a command…' });
    input.addEventListener('input', () => {
      const q = input.value.trim();
      const items = Array.from(results.querySelectorAll('.cmd-item'));
      items.forEach(el => {
        const text = el.querySelector('.cmd-label')?.textContent || el.textContent;
        const match = fuzzyMatch(q, text);
        el.style.display = match ? '' : 'none';
        el.dataset.score = match ? match.score : -999;
      });
      items.sort((a, b) => Number(b.dataset.score) - Number(a.dataset.score));
      items.forEach(el => results.appendChild(el));

    input.addEventListener('keydown', e => {

  <script>
/* ============================================================

    const coreCaps = ['llvm.ir.summary', 'llvm.ir.function_stats', 'clang.diag.summary',

  renderSkeleton() {
    const s = h('div', { class: 'dashboard-skeleton', style: { padding: '24px', display: 'flex', flexDirection: 'column', gap: '24px' } },

          Array.from({ length: 4 }, () => h('div', { style: { height: '80px', background: 'var(--bg2)', borderRadius: '8px', animation: 'shimmer 1.5s infinite' } }))
        )
      ),
      h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' } },
        h('div', { style: { height: '200px', background: 'var(--bg2)', borderRadius: '8px', animation: 'shimmer 1.5s infinite' } }),

      )

  },

  _renderHealthSection(container, health, unitCount, snap) {
    const headerRow = h('div', { style: { display: 'flex', gap: '16px', marginBottom: '16px', alignItems: 'stretch' } });
    headerRow.appendChild(this.renderHealthGauge(health, unitCount, snap));

    const snaps = State.get('snapshots') || [];
    if (snaps.length > 1) {
      const trendData = snaps.map(s => ({
        label: (s.id || '').slice(0, 6),
        value: s.health_score ?? 0,
      }));
      const spark = UI.sparkline(trendData, { color: 'var(--teal)', width: 160, height: 48 });
      if (spark) {
        headerRow.appendChild(h('div', { style: { display: 'flex', flexDirection: 'column', justifyContent: 'center', minWidth: '160px' } },
          h('div', { style: { fontSize: '11px', color: 'var(--fg3)', marginBottom: '4px' } }, 'Health Trend'),
          spark
        ));
      }

    container.appendChild(headerRow);

  _renderUnitsSection(container, units) {
    // Language distribution from units
    const byLang = {};
    units.forEach(u => {
      const lang = u.language || 'unknown';
      byLang[lang] = (byLang[lang] || 0) + 1;
    });

      .sort((a, b) => b[1] - a[1])
      .slice(0, 6)
      .map(([label, amount]) => ({ label, amount }));

    // Target distribution
    const byTarget = {};
    units.forEach(u => {
      const t = (u.target_triple || '').split('-')[0] || 'unknown';
      byTarget[t] = (byTarget[t] || 0) + 1;
    });
    const targetData = Object.entries(byTarget)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 6)
      .map(([label, amount]) => ({ label, amount }));

    if (langData.length || targetData.length) {

        targetData.forEach(d => {
          tagWrap.appendChild(h('div', {
            style: { display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '8px 14px', background: 'var(--bg2)', borderRadius: 'var(--r)', border: '1px solid var(--border)' }
          },
            h('span', { style: { fontWeight: '500' } }, d.label),
            h('span', { class: 'mono', style: { color: 'var(--accent)', fontSize: '16px', fontWeight: '600' } }, String(d.amount)),
            h('span', { class: 'text-muted', style: { fontSize: '11px' } }, d.amount === 1 ? 'unit' : 'units')
          ));
        });
        section.appendChild(tagWrap);
        grid.appendChild(section);
      }
      container.appendChild(grid);
    }
  },

  _renderDetailsSection(container, summary, aggregate, specs, snap, units) {
    const rawMetrics = Object.keys(summary.metrics || {}).length ? { ...summary.metrics } : { ...aggregate.metrics };
    // Override with correctly-tracked top-level values (avoids double-counting across capabilities)
    const overrides = { instructions: summary.instructions ?? aggregate.instructions,
                        functions: summary.functions ?? aggregate.functions,
                        remarks: summary.remarks ?? aggregate.remarks,
                        warnings: summary.warnings ?? aggregate.warnings,
                        errors: summary.errors ?? aggregate.errors };
    for (const [k, v] of Object.entries(overrides)) {
      if (v != null) rawMetrics[k] = v;
    }
    delete rawMetrics.instruction_count;
    delete rawMetrics.function_count;
    delete rawMetrics.remark_count;
    const metrics = rawMetrics;
    const health = typeof summary.health_score === 'number' ? summary.health_score : null;

    // Update header with metrics
    const headerRow = container.querySelector('div[style*="display: flex"]');
    if (headerRow) {
      const metricCards = CapabilityData.selectMetrics(metrics, 4);
      if (metricCards.length) {
        const cards = h('div', { class: 'metric-cards', style: { flex: '1' } });
        metricCards.forEach(c => cards.appendChild(UI.metric(c.label, c.value)));
        // Remove old metric cards if present
        const old = headerRow.querySelector('.metric-cards');
        if (old) headerRow.removeChild(old);
        headerRow.appendChild(cards);
      }

    // Overview grid: first-glance impact plots.
    const grid = h('div', { class: 'overview-grid', style: { marginTop: '18px' } });
    grid.appendChild(this._renderHotspotsPanel(aggregate.rows, snap.id));
    grid.appendChild(this._renderCodeSizePanel(aggregate.rows, snap.id));
    grid.appendChild(this._renderTopUnitsPanel(aggregate.rows, snap.id));
    grid.appendChild(this._renderRemarkPanel(aggregate.rows, snap.id));
    container.appendChild(grid);

    // Remark type breakdown donut
    const remarkTypeData = this._buildRemarkTypeBreakdown(aggregate.rows);
    if (remarkTypeData.length) {
      const donut = UI.donutChart(remarkTypeData);

          h('h3', {}, 'Remark Breakdown'),

        ));

    }

    // Pass breakdown from remarks by_pass data
    const queryUnits = aggregate.rows || [];
    const byPass = {};
    queryUnits.forEach(u => {
      const results = CapabilityData.normalizeResults(u.results || []);
      results.filter(r => r.capability.includes('remarks')).forEach(res => {
        const v = res.value || {};
        if (v.by_pass && typeof v.by_pass === 'object') {
          for (const [pass, count] of Object.entries(v.by_pass)) {
            if (typeof count === 'number') byPass[pass] = (byPass[pass] || 0) + count;
          }
        }
      });
    });
    const passEntries = Object.entries(byPass).sort((a, b) => b[1] - a[1]);
    if (passEntries.length) {
      const passData = passEntries.slice(0, 12).map(([label, amount]) => ({ label, amount }));
      container.appendChild(h('div', { class: 'chart-section', style: { marginTop: '18px' } },
        h('h3', {}, 'Top Optimization Passes'),

  _buildRemarkTypeBreakdown(rows) {
    const byType = {};
    (rows || []).forEach(r => {
      const results = CapabilityData.normalizeResults(r.results || []);
      results.filter(r => r.capability.includes('remarks')).forEach(res => {
        const v = res.value || {};
        if (v.by_type && typeof v.by_type === 'object') {
          for (const [type, count] of Object.entries(v.by_type)) {
            if (typeof count === 'number') byType[type] = (byType[type] || 0) + count;
          }
        }
      });
    });
    return Object.entries(byType)
      .filter(([, v]) => v > 0)
      .sort((a, b) => b[1] - a[1])
      .map(([label, value]) => ({ label: label.charAt(0).toUpperCase() + label.slice(1), value }));

  _renderCodeSizePanel(rows, snapId) {
    const section = h('div', { class: 'chart-section' },
      h('h3', {}, 'Code Size Distribution')
    );
    const sizes = (rows || [])
      .map(r => r.instructions || 0)
      .filter(n => n > 0)
      .sort((a, b) => a - b);
    if (!sizes.length) {
      section.appendChild(h('div', { class: 'empty-inline' }, 'No instruction count data available.'));
      return section;
    }
    const buckets = [
      { label: 'Small (<1K)', min: 0, max: 1000 },
      { label: 'Medium (1-10K)', min: 1000, max: 10000 },
      { label: 'Large (10-50K)', min: 10000, max: 50000 },
      { label: 'Huge (50K+)', min: 50000, max: Infinity },
    ];
    const flameData = buckets
      .map(b => ({ label: b.label, value: sizes.filter(s => s >= b.min && s < b.max).length }))
      .filter(d => d.value > 0);
    const flame = UI.flameBars(flameData);
    if (flame) {
      section.appendChild(flame);
      const legend = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '6px', fontSize: '11px' } });
      const colors = ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B', '#6EC9C4'];
      flameData.forEach((d, i) => {
        legend.appendChild(h('span', { style: { display: 'flex', alignItems: 'center', gap: '4px' } },
          h('i', { style: { width: '8px', height: '8px', borderRadius: '2px', background: colors[i % colors.length], display: 'inline-block', flexShrink: '0' } }),
          `${d.label}: ${d.value}`
        ));
      });
      section.appendChild(legend);
    } else {
      section.appendChild(h('div', { class: 'empty-inline' }, 'All units in one bucket.'));
    }
    return section;
  },

  renderHealthGauge(score, unitCount, snap) {
    const r = 34, cx = 42, cy = 42, sw = 6;
    const circ = 2 * Math.PI * r;
    const pct = score != null ? Math.max(0, Math.min(100, score)) : 0;
    const filled = (pct / 100) * circ;
    const cls = pct >= 80 ? 'excellent' : pct >= 60 ? 'good' : pct >= 40 ? 'fair' : 'poor';
    const strokeColor = { excellent: 'var(--green)', good: 'var(--teal)', fair: 'var(--orange)', poor: 'var(--red)' }[cls];
    const offset = (circ / 4).toFixed(1);

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '84');
    svg.setAttribute('height', '84');
    svg.setAttribute('viewBox', '0 0 84 84');

    const bgCircle = document.createElementNS(svgNS, 'circle');
    bgCircle.setAttribute('cx', cx);
    bgCircle.setAttribute('cy', cy);
    bgCircle.setAttribute('r', r);
    bgCircle.setAttribute('fill', 'none');
    bgCircle.setAttribute('stroke', 'var(--bg3)');
    bgCircle.setAttribute('stroke-width', sw);
    svg.appendChild(bgCircle);

    const fgCircle = document.createElementNS(svgNS, 'circle');
    fgCircle.setAttribute('cx', cx);
    fgCircle.setAttribute('cy', cy);
    fgCircle.setAttribute('r', r);
    fgCircle.setAttribute('fill', 'none');
    fgCircle.setAttribute('stroke', strokeColor);
    fgCircle.setAttribute('stroke-width', sw);
    fgCircle.setAttribute('stroke-dasharray', `${filled.toFixed(1)} ${circ.toFixed(1)}`);
    fgCircle.setAttribute('stroke-dashoffset', offset);
    fgCircle.setAttribute('stroke-linecap', 'round');
    fgCircle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    svg.appendChild(fgCircle);

    return h('div', { class: 'health-gauge' },
      h('div', { class: 'gauge-ring' }, svg),
      h('div', { class: 'gauge-info' },
        h('div', { class: `gauge-score ${cls}` }, score != null ? String(Math.round(score)) : '–'),
        h('div', { class: 'gauge-label' }, 'Health Score'),
        h('div', { class: 'gauge-sub' }, [
          `${unitCount} unit${unitCount !== 1 ? 's' : ''}`,
          snap ? timeAgo(snap.created_unix) : '',
          snap ? (snap.id || '').slice(0, 8) : '',
        ].filter(Boolean).join(' · '))
      )
    );
  },

  _renderTopUnitsPanel(rows, snapId) {
    const section = h('div', { class: 'chart-section' },
      h('h3', {}, 'Top Compilation Units by Size')
    );

    const sorted = [...rows]
      .filter(r => (r.instructions || 0) > 0 || (r.functions || 0) > 0)
      .sort((a, b) => (b.instructions || 0) - (a.instructions || 0))
      .slice(0, 10);

    if (!sorted.length) {
      section.appendChild(h('div', { class: 'empty-inline' }, 'No size data available yet'));
      return section;
    }

    const wrap = h('div', { class: 'top-units-wrap' });
    const table = h('table', { class: 'top-units-table' },
      h('thead', {}, h('tr', {},
        h('th', {}, 'Source'),
        h('th', { style: { textAlign: 'right' } }, 'Instructions'),
        h('th', { style: { textAlign: 'right' } }, 'Functions'),
        h('th', { style: { textAlign: 'right' } }, 'Warnings'),
      ))
    );
    const tbody = h('tbody', {});
    sorted.forEach(r => {
      const path = r.source_path || r.unit_id || '–';
      const parts = path.replace(/\\/g, '/').split('/');
      const file = parts.pop() || path;
      const shortDir = parts.length > 2 ? '…/' + parts.slice(-2).join('/') : (parts.length ? parts.join('/') : '');
      tbody.appendChild(h('tr', {
        style: { cursor: 'pointer' },
        onClick: () => Router.navigate(`/units/${encodeURIComponent(r.unit_id)}?snapshot=${encodeURIComponent(snapId)}`),
      },
        h('td', { class: 'path', title: path },
          shortDir ? h('span', { class: 'dir' }, shortDir + '/') : null,
          h('span', { class: 'file' }, file)
        ),
        h('td', { class: 'num' }, formatNumber(r.instructions)),
        h('td', { class: 'num' }, formatNumber(r.functions)),
        h('td', { class: 'num' }, (r.warnings || 0) > 0 ? String(r.warnings) : '–'),
      ));
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    section.appendChild(wrap);
    return section;
  },

  _renderHotspotsPanel(rows, snapId) {
    const section = h('div', { class: 'chart-section impact-panel' },
      h('h3', {}, 'Most Important Signals')
    );
    const totals = (rows || []).reduce((acc, r) => {
      acc.errors += Number(r.errors || 0);
      acc.warnings += Number(r.warnings || 0);
      acc.remarks += Number(r.remarks || 0);
      acc.unavailable += Number(r.unavailable || 0);
      return acc;
    }, { errors: 0, warnings: 0, remarks: 0, unavailable: 0 });
    const cards = [
      { key: 'errors', label: 'Errors', value: totals.errors, tone: 'danger', route: '/units' },
      { key: 'warnings', label: 'Warnings', value: totals.warnings, tone: 'warn', route: '/units' },
      { key: 'remarks', label: 'Remarks', value: totals.remarks, tone: 'info', route: '/units' },
      { key: 'units', label: 'Units scanned', value: rows.length, tone: 'neutral', route: '/units' },
    ];
    const grid = h('div', { class: 'impact-grid' });
    cards.forEach(card => {
      grid.appendChild(h('button', {
        class: `impact-card ${card.tone}`,
        onClick: () => Router.navigate(card.route),
      },
        h('span', { class: 'impact-value' }, formatNumber(card.value)),
        h('span', { class: 'impact-label' }, card.label)
      ));
    });
    section.appendChild(grid);

    const worst = [...(rows || [])]
      .filter(r => (r.errors || 0) > 0 || (r.warnings || 0) > 0 || (r.remarks || 0) > 0)
      .sort((a, b) => ((b.errors || 0) * 1000 + (b.warnings || 0) * 10 + (b.remarks || 0)) -
                      ((a.errors || 0) * 1000 + (a.warnings || 0) * 10 + (a.remarks || 0)))
      .slice(0, 5);
    if (worst.length) {
      const list = h('div', { class: 'hotspot-list' });
      worst.forEach(r => {
        const path = r.source_path || r.unit_id || '';
        const file = path.replace(/\\/g, '/').split('/').pop() || path;
        list.appendChild(h('button', {
          class: 'hotspot-row',
          title: path,
          onClick: () => Router.navigate(`/units/${encodeURIComponent(r.unit_id)}?snapshot=${encodeURIComponent(snapId)}`),
        },
          h('span', { class: 'hotspot-name' }, file),
          h('span', { class: 'hotspot-counts' }, [
            r.errors ? `${r.errors} err` : '',
            r.warnings ? `${r.warnings} warn` : '',
            r.remarks ? `${r.remarks} rem` : '',
          ].filter(Boolean).join(' · '))
        ));
      });
      section.appendChild(list);
    } else {
      section.appendChild(h('div', { class: 'empty-inline' }, 'No errors, warnings, or remarks reported yet.'));
    }
    return section;
  },

  _renderRemarkPanel(rows, snapId) {
    const section = h('div', { class: 'chart-section' },
      h('h3', {}, 'Remark Distribution by Unit')
    );
    const ranked = [...(rows || [])]
      .filter(r => (r.remarks || 0) > 0)
      .sort((a, b) => (b.remarks || 0) - (a.remarks || 0))
      .slice(0, 8);
    if (!ranked.length) {
      section.appendChild(h('div', { class: 'empty-inline' }, 'No optimization remarks available.'));
      return section;
    }
    const flameItems = ranked.map(r => {
      const path = r.source_path || r.unit_id || '';
      const file = path.replace(/\\/g, '/').split('/').pop() || path;
      return { label: file, value: r.remarks || 0 };
    });
    const flame = UI.flameBars(flameItems);
    if (flame) section.appendChild(flame);
    const legend = h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '8px', fontSize: '11px' } });
    const colors = ['#5B8DB8', '#5DB8A8', '#D4A574', '#9DB86E', '#C97DB8', '#9B7DB8', '#D48B9B', '#6EC9C4'];
    ranked.forEach((r, i) => {
      const path = r.source_path || r.unit_id || '';
      const file = path.replace(/\\/g, '/').split('/').pop() || path;
      legend.appendChild(h('span', {
        style: { display: 'flex', alignItems: 'center', gap: '4px', cursor: 'pointer' },
        onClick: () => Router.navigate(`/units/${encodeURIComponent(r.unit_id)}?snapshot=${encodeURIComponent(snapId)}`),
      },
        h('i', { style: { width: '8px', height: '8px', borderRadius: '2px', background: colors[i % colors.length], display: 'inline-block', flexShrink: '0' } }),
        `${file}: ${formatNumber(r.remarks)}`
      ));
    });
    section.appendChild(legend);
    return section;
  },
};

  <script>
/* ============================================================
   LLVM Advisor — Unit Explorer View
   ============================================================ */

const UnitsView = {
  _units: [],
  _filtered: [],
  _sort: 'name',
  _order: 'asc',
  _search: '',
  _groupByDir: false,
  _debounceTimer: null,

  async render() {
    const container = h('div', { style: { display: 'flex', flexDirection: 'column', height: 'calc(100vh - var(--topbar-h) - 48px)' } });

    container.appendChild(this.controls());
    container.appendChild(h('div', { class: 'unit-overview', id: 'unit-overview' }));

    // List container
    const listWrap = h('div', { class: 'unit-list', id: 'unit-list', style: { flex: '1', overflowY: 'auto' } });
    container.appendChild(listWrap);

    // Status bar
    container.appendChild(h('div', { class: 'status-bar', id: 'unit-status' }));

    Shell.renderMain(container);
    await this.loadUnits();
  },

  controls() {
    const searchInput = h('input', { placeholder: 'Search files and languages…', value: this._search });
    searchInput.addEventListener('input', () => {
      clearTimeout(this._debounceTimer);
      this._debounceTimer = setTimeout(() => {
        this._search = searchInput.value;
        this.applyFilters();
      }, 200);
    });

    return h('div', { class: 'unit-controls' },
      h('div', { class: 'search-input' },
        renderIcon(Icons.search),
        searchInput
      ),
      this.sortDropdown(),
      h('button', {
        class: `view-toggle ${this._groupByDir ? 'active' : ''}`,
        onClick: e => {
          this._groupByDir = !this._groupByDir;
          e.currentTarget.classList.toggle('active', this._groupByDir);
          this.renderList();
        }
      }, 'Group')
    );
  },

  sortDropdown() {
    const options = [
      { value: 'name', label: 'Filename' },
      { value: 'warnings', label: 'Warnings' },
      { value: 'instructions', label: 'Instructions ↓' },
      { value: 'symbols', label: 'Symbols ↓' },
    ];
    const dd = h('div', { class: 'dropdown' });
    const trigger = h('button', { class: 'dd-trigger', onClick: e => Shell.toggleDropdown(e) },
      `Sort: ${options.find(o => o.value === this._sort)?.label || 'Name'} ▾`
    );
    const menu = h('div', { class: 'dd-menu' });
    options.forEach(opt => {
      menu.appendChild(h('div', {
        class: 'dd-item' + (this._sort === opt.value ? ' selected' : ''),
        onClick: () => {
          this._sort = opt.value;
          this._order = opt.value === 'name' ? 'asc' : 'desc';
          trigger.textContent = `Sort: ${opt.label} ▾`;
          Shell.closeDropdowns();
          this.applyFilters();
        }
      }, opt.label));
    });
    dd.appendChild(trigger);
    dd.appendChild(menu);
    return dd;
  },

  async loadUnits() {
    const snap = State.get('currentSnapshot');
    if (!snap) {
      this._units = [];
      this.applyFilters();
      return;
    }
    const [res, metrics] = await Promise.all([
      API.units(snap.id),
      API.querySnapshot(snap.id, ['llvm.ir.summary', 'clang.diag.summary', 'llvm.obj.summary', 'llvm.remarks.summary']),
    ]);
    const units = Array.isArray(res.data) ? res.data : [];
    const byId = new Map();
    if (metrics.ok && Array.isArray(metrics.data)) {
      CapabilityData.aggregate(metrics.data).rows.forEach(row => byId.set(row.unit_id, row));
    }
    this._units = units.map(unit => ({ ...unit, ...(byId.get(unit.id) || {}) }));
    this.applyFilters();
  },

  applyFilters() {
    let list = [...this._units];
    // Search filter (fuzzy)
    if (this._search) {
      const q = this._search;
      list = list.map(u => {
        const text = (u.source_path || u.id || '') + ' ' + (u.language || '');
        const match = fuzzyMatch(q, text);
        return { unit: u, match };
      }).filter(x => x.match).sort((a, b) => b.match.score - a.match.score).map(x => x.unit);
    }
    // Sort
    const field = this._sort;
    const dir = this._order === 'asc' ? 1 : -1;
    list.sort((a, b) => {
      const av = field === 'name' ? (a.source_path || a.id || '') : (a[field] || 0);
      const bv = field === 'name' ? (b.source_path || b.id || '') : (b[field] || 0);
      if (typeof av === 'string') return av.localeCompare(bv) * dir;
      return (av - bv) * dir;
    });
    this._filtered = list;
    this.renderSummary();
    this.renderList();
    this.updateStatus();
  },

  renderSummary() {
    const el = document.getElementById('unit-overview');
    if (!el) return;
    clearEl(el);
    const total = this._filtered.length;
    const warnings = this._filtered.reduce((s, u) => s + Number(u.warnings || 0), 0);
    const errors = this._filtered.reduce((s, u) => s + Number(u.errors || 0), 0);
    const remarks = this._filtered.reduce((s, u) => s + Number(u.remarks || 0), 0);
    const instructions = this._filtered.reduce((s, u) => s + Number(u.instructions || 0), 0);
    [
      ['Units', total, 'neutral'],
      ['Errors', errors, errors ? 'danger' : 'neutral'],
      ['Warnings', warnings, warnings ? 'warn' : 'neutral'],
      ['Remarks', remarks, remarks ? 'info' : 'neutral'],
      ['Instructions', instructions, 'neutral'],
    ].forEach(([label, value, tone]) => {
      el.appendChild(h('div', { class: `unit-summary-card ${tone}` },
        h('span', { class: 'unit-summary-value' }, formatNumber(value)),
        h('span', { class: 'unit-summary-label' }, label)
      ));
    });
  },

  renderList() {
    const wrap = document.getElementById('unit-list');
    if (!wrap) return;
    clearEl(wrap);

    if (this._filtered.length === 0) {
      wrap.appendChild(h('div', { class: 'empty-state' },
        h('div', {}, this._units.length === 0 ? 'No units in snapshot' : 'No matching units'),
        h('div', { class: 'reason' }, this._search ? `No results for "${this._search}"` : 'Capture a snapshot to populate units')
      ));
      return;
    }

    if (this._groupByDir) {
      this.renderGrouped(wrap);
    } else {
      this.renderFlat(wrap);
    }
  },

  renderFlat(wrap) {
    // Virtualized: render only visible rows (simple version)
    const frag = document.createDocumentFragment();
    const limit = Math.min(this._filtered.length, 500); // cap for DOM perf
    for (let i = 0; i < limit; i++) {
      frag.appendChild(this.unitRow(this._filtered[i]));
    }
    wrap.appendChild(frag);
  },

  renderGrouped(wrap) {
    const groups = new Map();
    this._filtered.forEach(u => {
      const path = u.source_path || u.id || '';
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '.';
      if (!groups.has(dir)) groups.set(dir, []);
      groups.get(dir).push(u);
    });

    groups.forEach((units, dir) => {
      const totalInst = units.reduce((s, u) => s + (u.instructions || 0), 0);
      const totalWarn = units.reduce((s, u) => s + (u.warnings || 0), 0);
      const dirRow = h('div', { class: 'dir-row' },
        renderIcon(Icons.folder),
        h('span', {}, `${dir}/`),
        h('span', { class: 'text-muted', style: { marginLeft: 'auto', fontSize: '11px' } },
          `${units.length} units · inst:${formatNumber(totalInst)} · ⚠${totalWarn}`)
      );

      const children = h('div', { style: { display: 'none' } });
      units.forEach(u => children.appendChild(this.unitRow(u)));

      dirRow.addEventListener('click', () => {
        children.style.display = children.style.display === 'none' ? 'block' : 'none';
      });

      wrap.appendChild(dirRow);
      wrap.appendChild(children);
    });
  },

  unitRow(unit) {
    const path = unit.source_path || unit.id || '';
    const lastSlash = path.lastIndexOf('/');
    const dir = lastSlash >= 0 ? path.substring(0, lastSlash + 1) : '';
    const file = lastSlash >= 0 ? path.substring(lastSlash + 1) : path;
    const lang = unit.language || '';
    const target = (unit.target_triple || '').split('-')[0] || '';
    const warns = unit.warnings || 0;
    const errs = unit.errors || 0;
    const inst = unit.instructions;
    const symbols = unit.symbols;

    const row = h('div', { class: 'unit-row', onClick: () => {
      const snap = State.get('currentSnapshot');
      Router.navigate(`/units/${encodeURIComponent(unit.id)}${snap ? '?snapshot=' + encodeURIComponent(snap.id) : ''}`);
    }},
      h('div', { class: 'filepath' },
        h('span', { class: 'dir' }, dir),
        h('span', { class: 'file' }, file)
      ),
      h('div', { class: 'unit-metadata' },
        h('span', { class: 'lang-badge' }, lang || '–'),
        h('span', { class: 'target mono' }, target || '–')
      ),
      h('div', { class: 'unit-signals' },
        errs > 0 ? h('span', { class: 'signal-pill danger' }, `${errs} errors`) : null,
        warns > 0 ? h('span', { class: 'signal-pill warn' }, `${warns} warnings`) : null,
        (unit.remarks || 0) > 0 ? h('span', { class: 'signal-pill info' }, `${unit.remarks} remarks`) : null,
        errs === 0 && warns === 0 && !unit.remarks ? h('span', { class: 'signal-pill neutral' }, 'clean') : null
      ),
      h('div', { class: 'unit-size' },
        h('span', { class: 'mono-val' }, inst != null ? formatNumber(inst) : '–'),
        h('span', { class: 'unit-size-label' }, 'inst')
      ),
      h('div', { class: 'unit-size' },
        h('span', { class: 'mono-val' }, symbols != null ? formatNumber(symbols) : '–'),
        h('span', { class: 'unit-size-label' }, 'sym')
      ),
    );

    return row;
  },

  showDetail(unit) {
    // Hover should not open panels; unit details are opened intentionally by click.
  },

  updateStatus() {
    const bar = document.getElementById('unit-status');
    if (!bar) return;
    clearEl(bar);
    const total = this._units.length;
    const shown = this._filtered.length;
    const errs = this._filtered.filter(u => u.errors > 0).length;
    bar.appendChild(h('span', {}, `Showing ${formatNumber(shown)} units`));
    if (shown !== total) {
      bar.appendChild(h('span', { class: 'sep' }, ' · '));
      bar.appendChild(h('span', {}, `filtered from ${formatNumber(total)}`));
    }
    if (errs > 0) {
      bar.appendChild(h('span', { class: 'sep' }, ' · '));
      bar.appendChild(h('span', { style: { color: 'var(--red)' } }, `${errs} with errors`));
    }
  },
};
