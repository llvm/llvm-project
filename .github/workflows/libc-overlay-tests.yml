# This workflow is for pre-commit testing of the LLVM-libc project.
name: LLVM-libc Pre-commit Overlay Tests
permissions:
  contents: read
on:
  pull_request:
    paths:
      - 'libc/**'
      - '.github/workflows/libc-overlay-tests.yml'

jobs:
  build:
    if: github.repository_owner == 'llvm'
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations.
      fail-fast: false
      matrix:
        include:
          # TODO: add linux gcc when it is fixed
          - os: ubuntu-24.04
            container: 'ghcr.io/llvm/libc-ubuntu-24.04:latest@sha256:a902fb53bdad5e4a4bb6c11b6584e717a7b3d6e886f1ea58e11f95e46226249c'
            compiler:
              c_compiler: clang-23
              cpp_compiler: clang++-23
            linker: lld-23
          - os: ubuntu-24.04-arm
            container: 'ghcr.io/llvm/arm64v8/libc-ubuntu-24.04:latest@sha256:138636a45bb70f7b51a858b282e66291cb3c5c85371afee09032a5e09b263395'
            compiler:
              c_compiler: clang-23
              cpp_compiler: clang++-23
            linker: lld-23
          - os: windows-2022
            compiler:
              c_compiler: clang-cl
              cpp_compiler: clang-cl
          - os: windows-2025
            compiler:
              c_compiler: clang-cl
              cpp_compiler: clang-cl
          - os: macos-15
            compiler:
              c_compiler: clang
              cpp_compiler: clang++
    
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    
    # Libc's build is relatively small comparing with other components of LLVM.
    # A fresh linux overlay takes about 180MiB of uncompressed disk space, which can
    # be compressed into ~40MiB. MacOS and Windows overlay builds are less than 10MiB
    # after compression. Limiting the cache size to 1G should be enough.
    # Prefer sccache as it is modern and it has a guarantee to work with MSVC.
    # Do not use direct GHAC access even though it is supported by sccache. GHAC rejects
    # frequent small object writes.
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
      with:
        max-size: 1G
        key: libc_overlay_build_v2_${{ matrix.os }}_${{ matrix.compiler.c_compiler }}
        variant: sccache
    
    # Chocolatey is shipped with Windows runners. Windows Server 2025 recommends WinGet.
    # Consider migrating to WinGet when Windows Server 2025 is available.
    - name: Prepare dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install ninja
    
    - name: Prepare dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ninja

    # Use MinSizeRel to reduce the size of the build.
    # Notice that CMP0141=NEW and MSVC_DEBUG_INFORMATION_FORMAT=Embedded are required
    # by the sccache tool.
    - name: Configure CMake
      run: >
        cmake -B build
        -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.compiler.c_compiler }}
        -DCMAKE_BUILD_TYPE=RelWithDebInfo
        -DCMAKE_C_COMPILER_LAUNCHER=sccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
        -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
        -DLIBC_COMPILE_OPTIONS_NATIVE=""
        -DLLVM_ENABLE_RUNTIMES=libc
        -DLLVM_USE_LINKER="${{ matrix.linker }}"
        -G Ninja
        -S runtimes

    - name: Build
      run: >
        cmake 
        --build build
        --parallel 
        --target libc

    - name: Test
      run: >
        cmake 
        --build build 
        --parallel 
        --target check-libc

  qemu-riscv64:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout LLVM
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Prepare dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build clang lld qemu-user-static \
            libc6-dev-riscv64-cross libstdc++6-riscv64-cross \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu

      - name: Setup GMP
        run: |
          mkdir build
          cd build
          wget https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          tar -xf gmp-6.3.0.tar.xz
          cd gmp-6.3.0
          ./configure --host=riscv64-linux-gnu --prefix=/usr/riscv64-linux-gnu
          make -j8
          sudo make install
          cd ../..
      
      - name: Setup MPFR
        run: |
          cd build
          wget https://www.mpfr.org/mpfr-current/mpfr-4.2.1.tar.xz
          tar -xf mpfr-4.2.1.tar.xz
          cd mpfr-4.2.1
          ./configure --host=riscv64-linux-gnu --prefix=/usr/riscv64-linux-gnu \
                      --with-gmp=/usr/riscv64-linux-gnu
          make -j8
          sudo make install
          cd ../..
      
      - name: Configure CMake - Clang
        run: |
          cmake -B build/clang -S runtimes -G Ninja \
            -DLLVM_ENABLE_RUNTIMES=libc \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBC_TARGET_TRIPLE=riscv64-linux-gnu

      - name: Build and Run - Clang
        env:
          QEMU_LD_PREFIX: /usr/riscv64-linux-gnu
        run: |
          cmake --build build/clang --target libc-shared-tests

      - name: Configure CMake - gcc
        run: |
          cmake -B build/gcc -S runtimes -G Ninja \
            -DLLVM_ENABLE_RUNTIMES=libc \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=riscv64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBC_TARGET_TRIPLE=riscv64-linux-gnu

      - name: Build and Run - gcc
        env:
          QEMU_LD_PREFIX: /usr/riscv64-linux-gnu
        run: |
          cmake --build build/gcc --target libc-shared-tests
