name: SYCL Tests

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'libsycl/**'
      - '.github/workflows/sycl-tests.yml'

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  check_sycl:
    if: github.repository_owner == 'llvm'
    name: Test SYCL
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/llvm/ci-ubuntu-24.04:latest@sha256:571cfd8a5ec38a9f241b421c56aa821139c0fd9dcbde5f6161210884befb5ec4
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          max-size: 2G
          key: sycl-ubuntu-24.04
          variant: sccache
      - name: Build and Test
        run: |
          cmake -GNinja \
            -S llvm \
            -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DLLVM_ENABLE_RUNTIMES="offload;openmp;libsycl" \
            -DLLVM_TARGETS_TO_BUILD="host;SPIRV" \
            -DLLVM_INCLUDE_SPIRV_TOOLS_TESTS=ON

          ninja -C build check-sycl
