# This file contains an minimal ELF core file that contains everything needed
# to load a core file where the executable and shared libraries all have
# their ELF headers in the core file memory. The core file has the main
# executable's PT_DYNAMIC section so that we can read the DT_DEBUG from the
# dynamic section of the core file and read the shared library list from core
# memory. So this core file can read the shared library list and also get
# the UUID from the .gnu-build-id data in the ELF headers of each library.
--- !ELF
FileHeader:
  Class:           ELFCLASS64
  Data:            ELFDATA2LSB
  Type:            ET_CORE
  Machine:         EM_X86_64
ProgramHeaders:
  - Type:            PT_NOTE
    Align:           0x4
    FileSize:        0x1718
    Offset:          0x2a8
  - Type:            PT_LOAD
    Flags:           [ PF_R ]
    VAddr:           0x55bc64882000
    Align:           0x1000
    FileSize:        0x1000
    MemSize:         0x1000
    Offset:          0x2000
