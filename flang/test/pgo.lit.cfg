# -*- Python -*-

# Configuration used for performance training when optimizing flang with PGO

import lit.util

config.name = 'Flang PGO Training'

config.flang_exe = lit.util.which('flang', config.flang_opt_tools_dir).replace('\\', '/')

config.llvm_profile_file = '../perf-training-%4m.profraw'

# suffixes: A list of file extensions to treat as test files.
config.suffixes = [
    ".f",
    ".F",
    ".ff",
    ".FOR",
    ".for",
    ".f77",
    ".f90",
    ".F90",
    ".ff90",
    ".f95",
    ".F95",
    ".ff95",
    ".fpp",
    ".FPP",
    ".f18",
    ".F18",
    ".f03",
    ".F03",
    ".f08",
    ".F08",
]
