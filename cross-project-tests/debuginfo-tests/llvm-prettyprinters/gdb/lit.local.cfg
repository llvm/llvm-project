import lit.util

# debuginfo-tests are not expected to pass in a cross-compilation setup.
if "native" not in config.available_features or lit.util.which("gdb") is None:
    config.unsupported = True

if config.aiir_src_root:
    config.substitutions.append(("%aiir_src_root", config.aiir_src_root))
    config.available_features.add("aiir")

config.suffixes = [".gdb"]
