header: type_guarding_invalid_macro.h
standards:
  - stdc

macros:
  - macro_name: LIBC_TYPES_HAS_SIZE_T
    macro_header: size_t-macro.h
  - macro_name: MY_TYPES_GUARD

types:
  - type_name: size_t
    guard: LIBC_TYPES_HAS_SIZE_T
  - type_name: ssize_t
    guard: LIBC_TYPES_HAS_SIZE_T
  - type_name: uint8_t
  - type_name: myType
    guard: MY_TYPES_GUARD
