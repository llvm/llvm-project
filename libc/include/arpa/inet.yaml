header: arpa/inet.h
standards:
  - posix
merge_yaml_files:
  - ../htons-family.yaml
macros:
  - macro_name: INET_ADDRSTRLEN
    macro_header: inet-address-macros.h
  - macro_name: INET6_ADDRSTRLEN
    macro_header: inet-address-macros.h
types:
  - type_name: in_addr_t
  - type_name: struct_in_addr
enums: []
objects: []
functions:
  - name: inet_addr
    standards:
      - posix
    return_type: in_addr_t
    arguments:
      - type: const char *
  - name: inet_aton
    standards:
      - llvm_libc_ext
    return_type: int
    arguments:
      - type: const char *
      - type: struct in_addr *
